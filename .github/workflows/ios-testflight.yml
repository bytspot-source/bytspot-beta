name: iOS → TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'ios/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/ios-testflight.yml'
  workflow_dispatch:

concurrency:
  group: ios-build
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: macos-15
    timeout-minutes: 40
    env:
      LANG: en_US.UTF-8

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v5

      # ── 2. Node.js + Web build ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        # Note: type-check is skipped in CI because tRPC types require
        # the sibling bytspot-api repo. vite build catches real errors.

      - name: Build web assets
        run: npm run build

      # ── 3. Capacitor sync ───────────────────────────────────────
      - name: Sync Capacitor → iOS
        run: npx cap sync ios

      # ── 4. Xcode selection ──────────────────────────────────────
      - name: Select Xcode
        run: |
          # Use latest available Xcode on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      # ── 5. Ruby + Fastlane ──────────────────────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios/App

      # ── 6. Code Signing ─────────────────────────────────────────
      - name: Import distribution certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          # Create & configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode .p12 certificate from base64 secret
          python3 - <<'PY'
          import base64, os, pathlib, sys

          raw = os.environ.get('APPLE_CERTIFICATE', '').strip()
          if not raw:
              raise SystemExit('APPLE_CERTIFICATE secret is empty or unavailable')

          normalized = ''.join(raw.split())
          try:
              decoded = base64.b64decode(normalized, validate=True)
          except Exception as exc:
              raise SystemExit(f'APPLE_CERTIFICATE is not valid base64: {exc}')

          out = pathlib.Path(os.environ['RUNNER_TEMP']) / 'cert.p12'
          out.write_bytes(decoded)
          print(f'Wrote certificate to {out}')
          PY

          security import "$RUNNER_TEMP/cert.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Verify
          echo "--- Signing identities ---"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/bytspot.mobileprovision

          python3 - <<'PY'
          import base64, os, pathlib, sys

          raw = os.environ.get('APPLE_PROVISIONING_PROFILE', '').strip()
          if not raw:
              raise SystemExit('APPLE_PROVISIONING_PROFILE secret is empty or unavailable')

          normalized = ''.join(raw.split())
          try:
              decoded = base64.b64decode(normalized, validate=True)
          except Exception as exc:
              raise SystemExit(f'APPLE_PROVISIONING_PROFILE is not valid base64: {exc}')

          out = pathlib.Path(os.environ['RUNNER_TEMP']) / 'bytspot.mobileprovision'
          out.write_bytes(decoded)
          print(f'Wrote provisioning profile to {out}')
          PY

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Extract UUID and install
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" \
            /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "Installed profile UUID: $UUID"
          echo "PROVISIONING_PROFILE_UUID=$UUID" >> $GITHUB_ENV

      # ── 7. Build + Upload to TestFlight ─────────────────────────
      - name: Fastlane → TestFlight
        working-directory: ios/App
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_UUID: ${{ env.PROVISIONING_PROFILE_UUID }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: bundle exec fastlane beta

      # ── 8. Upload IPA artifact ──────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Bytspot-${{ github.run_number }}.ipa
          path: ios/App/build/Bytspot.ipa
          retention-days: 30

      # ── 9. Cleanup ──────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

