name: Ticketing E2E

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'scripts/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ticketing-e2e.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'scripts/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ticketing-e2e.yml'
  workflow_dispatch:

jobs:
  paid-ticket-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run paid ticketing Playwright spec
        run: npm run test:e2e:ticketing:spec

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ticketing-e2e-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

  virtual-patch-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run Virtual Patch Playwright suite
        run: npm run test:e2e:virtual-patch:all

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: virtual-patch-e2e-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14

  perks-gating-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Member Perks gating Playwright spec
        run: npm run test:e2e:perks-gating

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perks-gating-e2e-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14