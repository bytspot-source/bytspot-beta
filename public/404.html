<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Bytspot</title>
    <script>
      // SPA fallback: save the full path and redirect to root.
      // index.html will restore it via history.replaceState so
      // the app boots at the correct route.
      var path = window.location.pathname;
      if (path && path !== '/') {
        sessionStorage.setItem('spa_redirect', path);
      }
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
